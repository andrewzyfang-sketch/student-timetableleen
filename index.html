function showAccount(p){profile=p;overlay.hidden=true;A("#joinButton").hidden=false;A("#accountInfo").textContent="名字："+p.name+" · 编号 #"+p.serial;A("#signOutButton").hidden=false;watchGroups()}
async function selectGroup(id){const g=groups.find(x=>x.id===id);if(!g)return;activeGroup=g;localStorage.setItem("leen-active-group-"+auth.currentUser.uid,id);chat.hidden=false;A("#chatTitle").textContent=g.name;A("#identity").textContent="群组 #"+g.serial+(g.role==="owner"?" · 群主":"");if(stopMessages)stopMessages();stopMessages=onSnapshot(query(collection(db,"groups",id,"messages"),orderBy("createdAt","asc"),limit(80)),snap=>{const box=A("#messages");box.replaceChildren();snap.forEach(d=>{const x=d.data(),el=document.createElement("article");el.className="message"+(x.uid===auth.currentUser.uid?" mine":"");const b=document.createElement("b");b.textContent="#"+x.serial+" "+x.name;const body=document.createElement("div");body.textContent=x.text;const time=document.createElement("small");time.textContent=x.createdAt?.toDate?x.createdAt.toDate().toLocaleString():"刚刚";el.append(b,body,time);box.append(el)});box.scrollTop=box.scrollHeight})}
onAuthStateChanged(auth,async u=>{if(!u){if(overlay.hidden)authScreen("register");return}const p=await getDoc(doc(db,"users",u.uid));if(p.exists())showAccount(p.data());else if(!registering)await signOut(auth)});
A("#switchButton").onclick=()=>authScreen(mode==="login"?"register":"login");A("#skipButton").onclick=()=>{overlay.hidden=true;A("#joinButton").hidden=false};A("#joinButton").onclick=()=>authScreen("login");
form.onsubmit=async e=>{e.preventDefault();const n=name.value.trim(),pw=password.value;if(!valid(n)){error.textContent="名字需要 2–24 个字符。";return}if(pw.length<6){error.textContent="密码至少需要 6 位。";return}error.textContent=mode==="login"?"正在登录…":"正在创建…";try{if(mode==="login"){const c=await signInWithEmailAndPassword(auth,emailFor(n),pw),p=await getDoc(doc(db,"users",c.user.uid));if(!p.exists())throw Error("账号资料不存在。");showAccount(p.data());return}const r=doc(db,"usernames",encodeURIComponent(n.toLocaleLowerCase()));if((await getDoc(r)).exists())throw Error("这个名字已经被使用。");registering=true;const c=await createUserWithEmailAndPassword(auth,emailFor(n),pw);const p=await runTransaction(db,async tx=>{const registry=doc(db,"usernames",encodeURIComponent(n.toLocaleLowerCase())),counter=doc(db,"system","counter"),used=await tx.get(registry);if(used.exists())throw Error("这个名字已经被使用。");const count=await tx.get(counter),serial=(count.exists()?count.data().lastSerial||0:0)+1,data={name:n,serial,uid:c.user.uid,createdAt:serverTimestamp()};tx.set(doc(db,"users",c.user.uid),data);tx.set(registry,{uid:c.user.uid,name:n,serial});tx.set(counter,{lastSerial:serial});return data});registering=false;showAccount(p)}catch(x){registering=false;error.textContent=x.code==="auth/email-already-in-use"?"这个名字已经被使用。":(x.code==="auth/invalid-credential"?"名字或密码不正确。":(x.message||"操作失败，请再试一次。"))}};
A("#createGroupForm").onsubmit=async e=>{e.preventDefault();if(!profile)return;const groupName=A("#newGroupName").value.trim();if(groupName.length<2){A("#groupStatus").textContent="群组名称至少需要 2 个字符。";return}A("#groupStatus").textContent="正在创建群组…";try{const created=await runTransaction(db,async tx=>{const counter=doc(db,"system","groupCounter"),c=await tx.get(counter),serial=(c.exists()?c.data().lastSerial||0:0)+1,id="group-"+serial,data={id,serial,name:groupName,ownerUid:auth.currentUser.uid,ownerName:profile.name,createdAt:serverTimestamp()};tx.set(doc(db,"groups",id),data);tx.set(doc(db,"groupSerials",String(serial)),{id,serial});tx.set(doc(db,"groups",id,"members",auth.currentUser.uid),{uid:auth.currentUser.uid,name:profile.name,role:"owner"});tx.set(doc(db,"userGroups",auth.currentUser.uid,"items",id),{id,serial,name:groupName,role:"owner"});tx.set(counter,{lastSerial:serial});return data});A("#newGroupName").value="";A("#groupStatus").textContent="已创建群组 #"+created.serial;if(!groups.some(g=>g.id===created.id)){groups.push({id:created.id,serial:created.serial,name:created.name,role:"owner"});renderGroups();watchRequests()}selectGroup(created.id)}catch(x){A("#groupStatus").textContent=x.message||"创建失败。"}};
A("#searchGroupButton").onclick=async()=>{const serial=Number(A("#groupSerialSearch").value),box=A("#groupSearchResult");box.textContent="";if(!Number.isInteger(serial)||serial<1){box.textContent="请输入有效的群组编号。";return}const map=await getDoc(doc(db,"groupSerials",String(serial)));if(!map.exists()){box.textContent="没有这个群组。";return}const id=map.data().id,group=await getDoc(doc(db,"groups",id)),g=group.data(),member=await getDoc(doc(db,"groups",id,"members",auth.currentUser.uid));const text=document.createElement("p");text.textContent="#"+g.serial+" · "+g.name;const button=document.createElement("button");button.className="btn primary";if(member.exists()){button.textContent="打开群组";button.onclick=()=>selectGroup(id)}else{button.textContent="发送加入申请";button.onclick=async()=>{await setDoc(doc(db,"groups",id,"requests",auth.currentUser.uid),{uid:auth.currentUser.uid,name:profile.name,serial:profile.serial,status:"pending",createdAt:serverTimestamp()});button.textContent="申请已发送";button.disabled=true}}box.append(text,button)};
async function decideRequest(r,approved){await setDoc(doc(db,"groups",r.groupId,"requests",r.requestUid),{...r,status:approved?"approved":"rejected",decidedAt:serverTimestamp()},{merge:true});if(approved){await setDoc(doc(db,"groups",r.groupId,"members",r.requestUid),{uid:r.requestUid,name:r.name,role:"member"});await setDoc(doc(db,"userGroups",r.requestUid,"items",r.groupId),{id:r.groupId,serial:r.groupSerial,name:r.groupName,role:"member"})}}
A("#messageForm").onsubmit=async e=>{e.preventDefault();const v=A("#messageInput").value.trim();if(!v||!profile||!activeGroup)return;await addDoc(collection(db,"groups",activeGroup.id,"messages"),{text:v,name:profile.name,serial:profile.serial,uid:auth.currentUser.uid,createdAt:serverTimestamp()});A("#messageInput").value=""};
A("#signOutButton").onclick=async()=>{await signOut(auth);profile=null;activeGroup=null;groups=[];chat.hidden=true;A("#joinButton").hidden=false;A("#accountInfo").textContent="Not signed in";A("#signOutButton").hidden=true;A("#settingsDialog").close();authScreen("login")};
</script>
</body></html>
