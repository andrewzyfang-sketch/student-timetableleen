<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>My Timetable</title><link rel="icon" type="image/png" href="logo.png"><link rel="apple-touch-icon" href="logo.png"><style>
:root{--i:#172033;--m:#697086;--b:#f6f7fb;--c:#fff;--l:#e4e6ee;--a:#4f46e5}*{box-sizing:border-box}body{margin:0;background:var(--b);color:var(--i);font:16px system-ui,sans-serif}.app{max-width:650px;margin:auto;padding:24px 16px 40px}header{display:flex;justify-content:space-between;align-items:center;gap:12px}h1{font-size:1.5rem;margin:0}.sub{color:var(--m);font-size:.9rem;margin:4px 0 20px}.add,.save{border:0;border-radius:11px;padding:10px 14px;color:#fff;background:var(--a);font-weight:700}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:5px;background:#e9eaf1;border-radius:12px}.tab{border:0;border-radius:8px;padding:9px;background:transparent;color:var(--m);font-weight:700}.tab.active{background:#fff;color:var(--i)}.heading{display:flex;justify-content:space-between;align-items:baseline;margin:20px 2px 10px}.heading h2{font-size:1rem;margin:0}.heading span,.time,small{color:var(--m);font-size:.82rem}.list{display:grid;gap:10px}.class{display:grid;grid-template-columns:58px 5px 1fr auto;gap:12px;align-items:center;padding:13px;background:var(--c);border:1px solid var(--l);border-radius:14px}.bar{height:42px;border-radius:8px;background:var(--a)}.class p{margin:0;font-weight:700}.class small{display:block;margin-top:3px}.del{border:0;background:transparent;color:var(--m);font-size:1.2rem}.empty{padding:30px;text-align:center;color:var(--m);border:1px dashed var(--l);border-radius:14px;background:var(--c)}.week{display:grid;gap:10px}.day{background:var(--c);border:1px solid var(--l);border-radius:14px;overflow:hidden}.day h3{display:flex;justify-content:space-between;font-size:.95rem;margin:0;padding:12px;border-bottom:1px solid var(--l)}.item{display:grid;grid-template-columns:58px 1fr;gap:12px;padding:11px 12px;border-bottom:1px solid var(--l)}.item:last-child{border:0}.item b{font-size:.92rem}dialog{border:0;border-radius:18px;width:min(92vw,420px);padding:0;box-shadow:0 20px 60px #0005}dialog::backdrop{background:#17203380}form{padding:20px}form h2{margin:0 0 16px}label{display:block;font-size:.85rem;font-weight:700;margin:12px 0 5px}input,select{width:100%;padding:10px;border:1px solid #d9dce8;border-radius:9px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.actions{display:flex;justify-content:end;gap:9px;margin-top:20px}.cancel{border:0;background:transparent;color:var(--m);font-weight:700;padding:10px}@media(min-width:600px){.week{grid-template-columns:1fr 1fr}}
.brand{display:flex;align-items:center;gap:10px}.brand img{width:48px;height:48px;object-fit:cover;border-radius:50%;border:1px solid var(--l)}#language{width:auto;padding:8px;margin-left:8px}</style></head><body><main class="app"><header><div class="brand"><img src="logo.png" alt="LEEN timetable logo"><div><h1>My timetable</h1><p class="sub" id="date"></p></div></div><button class="add" id="add">+ Add class</button><label class="sr-only" for="language">Language</label><select id="language" aria-label="Language"><option value="en">English</option><option value="zh">中文</option></select></header><nav class="tabs"><button class="tab active" data-v="today">Today</button><button class="tab" data-v="week">Week</button></nav><section id="today"></section><section id="week" hidden></section></main><dialog id="modal"><form id="form"><h2>Add a class</h2><label>Class name<input id="name" required placeholder="e.g. Mathematics"></label><label>Day<select id="day"></select></label><div class="grid"><label>Starts<input id="start" type="time" required></label><label>Ends<input id="end" type="time" required></label></div><label>Room or note<input id="room" placeholder="e.g. Room B204"></label><div class="actions"><button class="cancel" type="button" id="cancel">Cancel</button><button class="save">Save class</button></div></form></dialog><script>
const days=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'],seed=[['Mathematics','Monday','09:00','10:00','Room B204'],['English Literature','Monday','11:15','12:15','Room A112'],['Physics','Tuesday','10:00','11:00','Science Lab 3'],['Computer Science','Wednesday','13:30','15:00','Lab C08'],['History','Thursday','09:30','10:30','Room A104'],['Art','Friday','12:00','13:30','Studio 2']].map((x,i)=>({id:i,...Object.fromEntries(['name','day','start','end','room'].map((k,j)=>[k,x[j]]))}));let list=JSON.parse(localStorage.getItem('timetable')||'null')||seed;const $=x=>document.querySelector(x),today=days[(new Date().getDay()+6)%7],fmt=x=>new Date('2000-01-01T'+x).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'}),sort=x=>[...x].sort((a,b)=>a.start.localeCompare(b.start));$('#date').textContent=new Intl.DateTimeFormat(undefined,{weekday:'long',month:'short',day:'numeric'}).format(new Date());$('#day').innerHTML=days.map(x=>'<option '+(x===today?'selected':'')+'>'+x+'</option>').join('');function del(id){list=list.filter(x=>x.id!==id);localStorage.setItem('timetable',JSON.stringify(list));render()}window.del=del;function row(x,buttons=false){return '<article class="class"><span class="time">'+fmt(x.start)+'<br>– '+fmt(x.end)+'</span><i class="bar"></i><div><p>'+x.name+'</p><small>'+ (x.room||'No location added')+'</small></div>'+ (buttons?'<button class="del" aria-label="Delete '+x.name+'" onclick="del('+x.id+')">×</button>':'')+'</article>'}function render(){let t=sort(list.filter(x=>x.day===today));$('#today').innerHTML='<div class="heading"><h2>'+today+'’s classes</h2><span>'+t.length+' scheduled</span></div>'+(t.length?'<div class="list">'+t.map(x=>row(x,true)).join('')+'</div>':'<div class="empty">No classes today. Enjoy your free time!</div>');$('#week').innerHTML='<div class="week">'+days.map(d=>{let a=sort(list.filter(x=>x.day===d));return '<section class="day"><h3><span>'+d+'</span><small>'+ (a.length||'Free')+'</small></h3>'+ (a.map(x=>'<div class="item"><span class="time">'+fmt(x.start)+'<br>– '+fmt(x.end)+'</span><div><b>'+x.name+'</b><br><small>'+ (x.room||'No location added')+'</small></div></div>').join('')||'<div class="item"><small>No classes</small></div>')+'</section>'}).join('')+'</div>'}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===b));$('#today').hidden=b.dataset.v!=='today';$('#week').hidden=b.dataset.v!=='week'});$('#add').onclick=()=>$('#modal').showModal();$('#cancel').onclick=()=>$('#modal').close();$('#form').onsubmit=e=>{e.preventDefault();let x={id:Date.now(),name:$('#name').value,day:$('#day').value,start:$('#start').value,end:$('#end').value,room:$('#room').value};if(x.end<=x.start)return alert('End time must be after the start time.');list.push(x);localStorage.setItem('timetable',JSON.stringify(list));e.target.reset();$('#modal').close();render()};render();
</script><script>
var uiLanguage=localStorage.getItem('timetable-language')||'en';
var textPack={
 en:{title:'My timetable',add:'+ Add class',today:'Today',week:'Week',addTitle:'Add a class',className:'Class name',day:'Day',starts:'Starts',ends:'Ends',room:'Room or note',cancel:'Cancel',save:'Save class',scheduled:'scheduled',free:'Free',noClasses:'No classes',noToday:'No classes today. Enjoy your free time!',noLocation:'No location added',delete:'Delete',endAlert:'End time must be after the start time.',days:['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday']},
 zh:{title:'我的课程表',add:'+ 添加课程',today:'今天',week:'本周',addTitle:'添加课程',className:'课程名称',day:'星期',starts:'开始时间',ends:'结束时间',room:'教室或备注',cancel:'取消',save:'保存课程',scheduled:'节课',free:'空闲',noClasses:'没有课程',noToday:'今天没有课程，好好休息！',noLocation:'未添加地点',delete:'删除',endAlert:'结束时间必须晚于开始时间。',days:['星期一','星期二','星期三','星期四','星期五','星期六','星期日']}
};
function languageText(){return textPack[uiLanguage]}
function applyLanguage(){
 var q=languageText(), labels=document.querySelectorAll('#form label');
 document.documentElement.lang=uiLanguage==='zh'?'zh':'en';
 document.title=q.title; document.querySelector('h1').textContent=q.title; document.querySelector('#add').textContent=q.add;
 document.querySelector('[data-v="today"]').textContent=q.today; document.querySelector('[data-v="week"]').textContent=q.week;
 document.querySelector('#form h2').textContent=q.addTitle; labels[0].childNodes[0].nodeValue=q.className; labels[1].childNodes[0].nodeValue=q.day; labels[2].childNodes[0].nodeValue=q.starts; labels[3].childNodes[0].nodeValue=q.ends; labels[4].childNodes[0].nodeValue=q.room;
 document.querySelector('#cancel').textContent=q.cancel; document.querySelector('.save').textContent=q.save;
 document.querySelector('#day').innerHTML=days.map((d,i)=>'<option value="'+d+'" '+(d===today?'selected':'')+'>'+q.days[i]+'</option>').join('');
 render();
}
render=function(){
 var q=languageText(), t=sort(list.filter(function(x){return x.day===today}));
 $('#today').innerHTML='<div class="heading"><h2>'+q.days[days.indexOf(today)]+' '+(uiLanguage==='zh'?'课程':'classes')+'</h2><span>'+t.length+' '+q.scheduled+'</span></div>'+(t.length?'<div class="list">'+t.map(function(x){return '<article class="class"><span class="time">'+fmt(x.start)+'<br>– '+fmt(x.end)+'</span><i class="bar"></i><div><p>'+x.name+'</p><small>'+(x.room||q.noLocation)+'</small></div><button class="del" aria-label="'+q.delete+' '+x.name+'" onclick="del('+x.id+')">×</button></article>'}).join('')+'</div>':'<div class="empty">'+q.noToday+'</div>');
 $('#week').innerHTML='<div class="week">'+days.map(function(d,i){var a=sort(list.filter(function(x){return x.day===d}));return '<section class="day"><h3><span>'+q.days[i]+'</span><small>'+(a.length?a.length+' '+q.scheduled:q.free)+'</small></h3>'+(a.map(function(x){return '<div class="item"><span class="time">'+fmt(x.start)+'<br>– '+fmt(x.end)+'</span><div><b>'+x.name+'</b><br><small>'+(x.room||q.noLocation)+'</small></div></div>'}).join('')||'<div class="item"><small>'+q.noClasses+'</small></div>')+'</section>'}).join('')+'</div>';
};
document.querySelector('#language').value=uiLanguage;
document.querySelector('#language').onchange=function(){uiLanguage=this.value;localStorage.setItem('timetable-language',uiLanguage);applyLanguage()};
applyLanguage();
</script></body></html>
