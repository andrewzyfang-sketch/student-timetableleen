  const name = document.querySelector("#joinName").value.trim();
  const valid = /^[\p{L}\p{N}_ -]{2,24}$/u.test(name);
  if (!valid) { joinError.textContent = "名字需要 2–24 个字，可使用中文、字母、数字、空格、_ 或 -。"; return; }
  const normalized = name.toLocaleLowerCase();
  joinError.textContent = "正在创建账号…";
  try {
    const profile = await runTransaction(db, async transaction => {
      const userRef = doc(db, "users", auth.currentUser.uid);
      const nameRef = doc(db, "usernames", encodeURIComponent(normalized));
      const counterRef = doc(db, "system", "counter");
      const nameUsed = await transaction.get(nameRef);
      if (nameUsed.exists()) throw new Error("这个名字已经被使用，请换一个。");
      const counter = await transaction.get(counterRef);
      const serial = (counter.exists() ? (counter.data().lastSerial || 0) : 0) + 1;
      const data = { name, serial, uid: auth.currentUser.uid, createdAt: serverTimestamp() };
      transaction.set(userRef, data);
      transaction.set(nameRef, { uid: auth.currentUser.uid, name, serial });
      transaction.set(counterRef, { lastSerial: serial });
      return data;
    });
    showChat(profile);
  } catch (error) {
    joinError.textContent = error.message || "无法创建账号，请再试一次。";
  }
});

messageForm.addEventListener("submit", async event => {
  event.preventDefault();
  const text = messageInput.value.trim();
  if (!text || !chatUser) return;
  messageInput.disabled = true;
  try {
    await addDoc(collection(db, "messages"), { text, name: chatUser.name, serial: chatUser.serial, uid: auth.currentUser.uid, createdAt: serverTimestamp() });
    messageInput.value = "";
  } catch (error) {
    alert("发送失败，请检查网络后重试。");
  } finally { messageInput.disabled = false; messageInput.focus(); }
});
</script></body></html>
